---
name: Кортежи
tips:
  - |
    [Кортежи в документации Python](https://docs.python.org/3/tutorial/datastructures.html#tuples-and-sequences)
definitions:
  - name: Кортеж (tuple)
    description: >-
      упорядоченная неизменяемая последовательность значений. Создается
      с помощью круглых скобок: `(1, 2, 3)`.
  - name: Распаковка (unpacking)
    description: >-
      присвоение элементов кортежа нескольким переменным за одну операцию,
      например `x, y = (10, 20)`.
  - name: Индексация
    description: >-
      доступ к элементу последовательности по порядковому номеру, начиная
      с нуля. Например, `t[0]` обращается к первому элементу кортежа `t`.
