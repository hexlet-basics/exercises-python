---

name: Agregación de datos (Cadenas)
theory: |

  La agregación de cadenas es cuando no se sabe de antemano qué contienen las cadenas y cuál es su tamaño.

  Imagina una función que pueda multiplicar una cadena, repitiéndola un número fijo o determinado de veces:

  ```python
  repeat('hexlet', 3)  # 'hexlethexlethexlet'
  ```

  El principio de funcionamiento de esta función es que en un bucle se va "acumulando" la cadena un número determinado de veces:

  ```python
  def repeat(text, times):
      # El elemento neutro para las cadenas es una cadena vacía
      result = ''
      i = 1

      while i <= times:
          # En cada iteración, se agrega la cadena al resultado
          result = result + text
          i = i + 1

      return result
  ```


  Veamos cómo se ejecuta este código paso a paso:

  ```python
  # Para llamar a repeat('hexlet', 3)
  result = ''
  result = result + 'hexlet'  # hexlet
  result = result + 'hexlet'  # hexlethexlet
  result = result + 'hexlet'  # hexlethexlethexlet
  ```

instructions: |

  Implementa la función `sanitize_phone_number()`, que recibe un número de teléfono de un formulario y devuelve una cadena sin espacios, paréntesis ni guiones.

  Los usuarios escriben los números de teléfono de distintas maneras, pero las aplicaciones suelen guardarlos en un solo formato. Recorre la cadena original carácter por carácter y construye un nuevo número solo con los caracteres útiles.

  ```python
  sanitize_phone_number('+7 (999) 123-45-67')  # '+79991234567'
  sanitize_phone_number('8 800 555 35 35')     # '88005553535'
  sanitize_phone_number('(123) 456-7890')      # '1234567890'
  ```

